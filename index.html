        function setLanguage(lang) {
            currentLang = lang; const c = CONTENT[lang];
            document.getElementById('lang-id').classList.toggle('lang-active', lang === 'id');
            document.getElementById('lang-en').classList.toggle('lang-active', lang === 'en');
            document.getElementById('lang-label').innerText = c.lang_label;

            document.getElementById('analyzing-text').innerText = c.analyzing;
            document.getElementById('pre-result-title').innerText = c.pre_result_title;
            document.getElementById('pre-result-desc').innerHTML = c.pre_result_desc;
            document.getElementById('pre-result-btn').innerText = c.pre_result_btn;
            document.getElementById('result-save-hint').innerText = c.res_hint;
            document.querySelectorAll('[data-t]').forEach(el => { const key = el.getAttribute('data-t'); if (c[key]) el.innerHTML = c[key]; });
            if (!document.getElementById('view-quiz').classList.contains('hidden')) renderQuestion();
        }

        function switchView(viewId) { ['hero', 'quiz', 'analyzing', 'pre-result', 'result'].forEach(v => { const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden'); }); const target = document.getElementById(`view-${viewId}`); if(target) { target.classList.remove('hidden'); target.classList.add('fade-in'); } window.scrollTo(0,0); }
        function startQuiz() { window.dataLayer.push({ 'event': 'quiz_start' }); currentQuestionIndex = 0; score = 0; switchView('quiz'); renderQuestion(); }

        function renderQuestion() {
            const c = CONTENT[currentLang], q = c.questions[currentQuestionIndex];
            document.getElementById('quiz-progress-text').innerText = c.quiz_progress.replace('{n}', currentQuestionIndex + 1);
            document.getElementById('quiz-progress-bar').style.width = `${((currentQuestionIndex + 1) / 6) * 100}%`;
            document.getElementById('quiz-image').src = q.image;
            document.getElementById('quiz-question').innerText = q.question;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `btn-hop w-full text-center p-6 md:p-8 rounded-[1.8rem] bg-white/60 border-2 border-white/80 font-bold text-gray-800 hover:bg-white shadow-sm font-sans transition-all active:scale-95 mx-auto flex items-center justify-center min-h-[80px] overflow-hidden`;
                btn.innerHTML = `<span class="text-base md:text-lg leading-tight font-sans text-center w-full block px-2">${opt.text}</span>`;
                btn.onclick = () => {
                    window.dataLayer.push({ 'event': 'question_answered', 'question_number': currentQuestionIndex + 1, 'selected_option': opt.id });
                    score += opt.value;
                    if (currentQuestionIndex < 5) { currentQuestionIndex++; renderQuestion(); }
                    else { finishQuiz(); }
                };
                optionsContainer.appendChild(btn);
            });
        }

        function finishQuiz() { window.dataLayer.push({'event': 'quiz_complete'}); switchView('analyzing'); if (score <= 2) finalResult = RESULTS.baby; else if (score <= 4) finalResult = RESULTS.adventurer; else finalResult = RESULTS.dragon; document.getElementById('result-image').src = finalResult.image; document.getElementById('result-glow').style.backgroundColor = finalResult.accent; setTimeout(() => { switchView('pre-result'); }, 2000); }
        function viewFinalResult() { window.dataLayer.push({ 'event': 'SubmitForm', 'result_level': finalResult.level, 'conversion_type': 'quiz_result_view' }); switchView('result'); }
        async function downloadResult() { window.dataLayer.push({'event': 'click_download'}); const link = document.createElement('a'); link.href = finalResult.image; link.download = `InsightOut_Result_${finalResult.level}.jpg`; link.click(); }
        async function handleSmartShare() { window.dataLayer.push({'event': 'click_share'}); const text = currentLang === 'en' ? `I'm a ${finalResult.level}! Check your K-spicy level! 🔥` : `Saya level ${finalResult.level}! Cek level K-spicy kamu! 🔥`; if (navigator.share) { try { await navigator.share({ title: 'K-Spicy Level', text: text, url: window.location.href }); } catch (err) {} } else { const dummy = document.createElement('input'); document.body.appendChild(dummy); dummy.value = window.location.href; dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy); const toast = document.getElementById('custom-toast'); toast.innerText = CONTENT[currentLang].toast_copy; toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2000); window.dataLayer.push({'event': 'click_copy_link'}); } }
        function retakeQuiz() { window.dataLayer.push({'event': 'click_retake'}); location.reload(); }
        window.onload = () => { setLanguage('en'); preloadAllImages(); };
